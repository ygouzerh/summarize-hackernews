<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HN Summary</title>
  <link rel="stylesheet" href="results.css">
</head>
<body>
  <div id="app">
    <header>
      <div class="header-inner">
        <a class="logo" href="https://news.ycombinator.com" target="_self">HN</a>
        <div id="post-meta">
          <h1 id="post-title">Loading…</h1>
          <a id="post-link" href="#" target="_blank" class="post-link hidden">View on Hacker News</a>
        </div>
      </div>
    </header>

    <main>
      <div id="error-banner" class="error-banner hidden"></div>

      <div id="summary-content" class="content loading">
        <div id="phase-list">
          <div id="phase-research" class="phase-row phase-pending">
            <span class="phase-status">·</span>
            <span class="phase-label">Researching article</span>
            <span class="phase-time"></span>
          </div>
          <div id="phase-chunks" class="phase-row phase-pending">
            <span class="phase-status">·</span>
            <span class="phase-label">Summarizing comments</span>
            <span class="phase-time"></span>
          </div>
          <div id="phase-synthesis" class="phase-row phase-pending">
            <span class="phase-status">·</span>
            <span class="phase-label">Generating final summary</span>
            <span class="phase-time"></span>
          </div>
        </div>
      </div>

      <section id="around-the-web" class="around-the-web hidden">
        <h2>Around the Web</h2>
        <div id="around-the-web-content" class="content loading">
          <div class="spinner"></div>
          <span>Searching for outside reactions…</span>
        </div>
      </section>
    </main>
  </div>

  <script src="lib/marked.min.js"></script>
  <script src="results.js"></script>
</body>
</html>
